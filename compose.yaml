services:
   proxy:
     image: nginx
     container_name: proxy
     ports:
       - "8080:80"
     volumes:
       - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
     depends_on:
       - web

   web:
     image: nginx
     container_name: web
     volumes:
       - ./web/index.html:/usr/share/nginx/html/index.html:ro
